# Netlify static artifact configuration for HyperCLI sites
#
# GitHub CI builds each app in the Node container and publishes the assembled
# artifact with `netlify deploy --no-build`. Netlify projects are deploy-only
# and should not run repo builds or framework plugins.

# Cache control headers for static assets
[[headers]]
  for = "/*"
  [headers.values]
    # Don't cache HTML files to ensure latest content
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    # Next.js static assets have content hashes, can be cached forever
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    # Static assets can be cached for a year
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    # JavaScript files cached for 1 hour
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    # CSS files cached for 1 hour
    Cache-Control = "public, max-age=3600, must-revalidate"
