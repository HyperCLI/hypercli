name: SDK Integration Tests

on:
  workflow_call:
  workflow_dispatch:

env:
  GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  ts-sdk-unit:
    runs-on: self-hosted
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: ts-sdk
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Normalize workspace ownership
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ts-sdk/package-lock.json

      - name: Install TS SDK dependencies
        run: npm ci

      - name: Run TS SDK unit tests
        run: npm test

  python-sdk-unit:
    runs-on: self-hosted
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Normalize workspace ownership
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python SDK and CLI
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e "sdk[dev]" -e cli

      - name: Run Python SDK and CLI unit tests
        run: |
          source .venv/bin/activate
          pytest --import-mode=importlib -q \
            sdk/tests/test_bootstrap_dev_test_keys.py \
            sdk/tests/test_bootstrap_console_test_key.py \
            sdk/tests/test_jobs.py \
            sdk/tests/test_agents.py \
            sdk/tests/test_keys.py \
            sdk/tests/test_exec_shell_dryrun.py \
            cli/tests/test_jobs_list_tags.py \
            cli/tests/test_exec_shell_dryrun.py

  ts-sdk-integration:
    needs: [ts-sdk-unit, python-sdk-unit]
    runs-on: self-hosted
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: ts-sdk
    env:
      BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
      TEST_API_BASE: https://api.dev.hypercli.com
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Normalize workspace ownership
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ts-sdk/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bootstrap live integration credentials
        working-directory: ${{ github.workspace }}
        run: |
          if [ -z "${BACKEND_API_KEY:-}" ]; then
            echo "BACKEND_API_KEY is empty"
          else
            echo "BACKEND_API_KEY len=${#BACKEND_API_KEY} prefix_ok=$([[ ${BACKEND_API_KEY} == orchestra_dev_* ]] && echo yes || echo no) suffix=${BACKEND_API_KEY: -6}"
          fi
          python3 -m venv .bootstrap-venv
          source .bootstrap-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install requests
          python .github/scripts/bootstrap_dev_test_keys.py bootstrap --format github-env >> "$GITHUB_ENV"

      - name: Install TS SDK dependencies
        run: npm ci

      - name: Run TS SDK integration tests
        run: |
          set -o pipefail
          LOG_FILE="$(mktemp)"
          if npm run test:integration 2>&1 | tee "${LOG_FILE}"; then
            exit 0
          fi
          if grep -Eq "No connected clusters available for tags|has entitlement capacity but no connected clusters are advertising that tag" "${LOG_FILE}"; then
            echo "Skipping TS SDK integration failure due to dev cluster tag capacity"
            exit 0
          fi
          exit 1

      - name: Cleanup bootstrapped credentials
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          if [ -d .bootstrap-venv ]; then
            source .bootstrap-venv/bin/activate
          fi
          if [ -n "${BOOTSTRAP_STATE_FILE:-}" ] && [ -f "${BOOTSTRAP_STATE_FILE}" ]; then
            python .github/scripts/bootstrap_dev_test_keys.py cleanup --state-file "${BOOTSTRAP_STATE_FILE}" || true
          fi

  python-sdk-integration:
    needs: [ts-sdk-unit, python-sdk-unit]
    runs-on: self-hosted
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: sdk
    env:
      BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
      TEST_API_BASE: https://api.dev.hypercli.com
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Normalize workspace ownership
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bootstrap live integration credentials
        working-directory: ${{ github.workspace }}
        run: |
          if [ -z "${BACKEND_API_KEY:-}" ]; then
            echo "BACKEND_API_KEY is empty"
          else
            echo "BACKEND_API_KEY len=${#BACKEND_API_KEY} prefix_ok=$([[ ${BACKEND_API_KEY} == orchestra_dev_* ]] && echo yes || echo no) suffix=${BACKEND_API_KEY: -6}"
          fi
          python -m venv .bootstrap-venv
          source .bootstrap-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install requests
          python .github/scripts/bootstrap_dev_test_keys.py bootstrap --format github-env >> "$GITHUB_ENV"

      - name: Install Python SDK
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Python SDK integration tests
        run: |
          source .venv/bin/activate
          LOG_FILE="$(mktemp)"
          if pytest -q tests/integration 2>&1 | tee "${LOG_FILE}"; then
            exit 0
          fi
          if grep -Eq "No connected clusters available for tags|has entitlement capacity but no connected clusters are advertising that tag" "${LOG_FILE}"; then
            echo "Skipping Python SDK integration failure due to dev cluster tag capacity"
            exit 0
          fi
          exit 1

      - name: Cleanup bootstrapped credentials
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          if [ -d .bootstrap-venv ]; then
            source .bootstrap-venv/bin/activate
          fi
          if [ -n "${BOOTSTRAP_STATE_FILE:-}" ] && [ -f "${BOOTSTRAP_STATE_FILE}" ]; then
            python .github/scripts/bootstrap_dev_test_keys.py cleanup --state-file "${BOOTSTRAP_STATE_FILE}" || true
          fi

  notify-sdk-integration:
    needs:
      - ts-sdk-unit
      - python-sdk-unit
      - ts-sdk-integration
      - python-sdk-integration
    if: always()
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Normalize workspace ownership
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"

      - name: Notify SDK integration result
        continue-on-error: true
        env:
          NOTIFY_URL: ${{ vars.NOTIFY_URL }}
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
        run: |
          if [ "${{ needs.ts-sdk-unit.result }}" = "success" ] && [ "${{ needs.python-sdk-unit.result }}" = "success" ] && [ "${{ needs.ts-sdk-integration.result }}" = "success" ] && [ "${{ needs.python-sdk-integration.result }}" = "success" ]; then
            STATUS="success"
            MESSAGE="SDK unit and integration tests passed"
          else
            STATUS="failure"
            MESSAGE="SDK unit or integration tests failed"
          fi

          python3 .github/scripts/ci_notify.py \
            --category sdk \
            --phase test \
            --status "${STATUS}" \
            --event "${{ github.event_name }}" \
            --message "${MESSAGE}" \
            --workflow "SDK Integration Tests" \
            --channel github \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Fail workflow when SDK jobs fail
        if: needs.ts-sdk-unit.result != 'success' || needs.python-sdk-unit.result != 'success' || needs.ts-sdk-integration.result != 'success' || needs.python-sdk-integration.result != 'success'
        run: exit 1
