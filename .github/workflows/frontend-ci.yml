name: Frontend CI
run-name: Frontend CI

on:
  push:
    branches: [main, dev]
    paths:
      - ".github/workflows/**"
      - "site/**"
      - "ts-sdk/**"
      - "sdk/**"
  workflow_dispatch:

jobs:
  sdk:
    uses: ./.github/workflows/sdk-integration-tests.yml
    secrets: inherit

  build-site:
    needs: sdk
    uses: ./.github/workflows/build-site.yml
    secrets: inherit

  e2e-console:
    needs: build-site
    uses: ./.github/workflows/e2e-tests.yml
    secrets: inherit

  e2e-agents:
    needs: build-site
    uses: ./.github/workflows/e2e-agents.yml
    secrets: inherit
