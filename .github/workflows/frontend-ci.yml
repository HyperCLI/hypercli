name: Frontend CI
run-name: Frontend CI

on:
  push:
    branches: [main, dev]
    paths:
      - ".github/workflows/**"
      - ".github/scripts/**"
      - ".github/docker/**"
      - "site/**"
      - "ts-sdk/**"
      - "sdk/**"
      - "cli/**"
  workflow_dispatch:

jobs:
  sdk:
    uses: ./.github/workflows/sdk-integration-tests.yml
    secrets: inherit

  build-site-builder:
    runs-on: self-hosted
    env:
      SITE_BUILDER_IMAGE: ${{ secrets.SITE_BUILDER_IMAGE }}
      SITE_BUILDER_REGISTRY: ${{ secrets.SITE_BUILDER_REGISTRY }}
      SITE_BUILDER_REGISTRY_USERNAME: ${{ secrets.SITE_BUILDER_REGISTRY_USERNAME }}
      SITE_BUILDER_REGISTRY_PASSWORD: ${{ secrets.SITE_BUILDER_REGISTRY_PASSWORD }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Validate site builder secrets
        run: |
          set -euo pipefail

          require_value() {
            local value="$1"
            local name="$2"
            if [ -z "${value}" ]; then
              echo "${name} is required" >&2
              exit 1
            fi
          }

          require_value "${SITE_BUILDER_IMAGE:-}" "SITE_BUILDER_IMAGE"
          require_value "${SITE_BUILDER_REGISTRY:-}" "SITE_BUILDER_REGISTRY"
          require_value "${SITE_BUILDER_REGISTRY_USERNAME:-}" "SITE_BUILDER_REGISTRY_USERNAME"
          require_value "${SITE_BUILDER_REGISTRY_PASSWORD:-}" "SITE_BUILDER_REGISTRY_PASSWORD"

      - name: Log in to site builder registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SITE_BUILDER_REGISTRY }}
          username: ${{ env.SITE_BUILDER_REGISTRY_USERNAME }}
          password: ${{ env.SITE_BUILDER_REGISTRY_PASSWORD }}

      - name: Build and push site builder image
        run: |
          set -euo pipefail
          IMAGE_TAG="${GITHUB_SHA}" \
          SITE_IMAGE="${SITE_BUILDER_IMAGE}" \
          PUSH_IMAGE=1 \
            .github/scripts/build_site_image.sh

  publish-main:
    needs: build-site-builder
    uses: ./.github/workflows/publish-sites.yml
    with:
      deploy_environment: ${{ github.ref_name == 'main' && 'feat' || 'dev' }}
      site: main
    secrets: inherit

  publish-console:
    needs: build-site-builder
    uses: ./.github/workflows/publish-sites.yml
    with:
      deploy_environment: ${{ github.ref_name == 'main' && 'feat' || 'dev' }}
      site: console
    secrets: inherit

  publish-claw:
    needs: build-site-builder
    uses: ./.github/workflows/publish-sites.yml
    with:
      deploy_environment: ${{ github.ref_name == 'main' && 'feat' || 'dev' }}
      site: claw
    secrets: inherit

  e2e-console:
    uses: ./.github/workflows/e2e-tests.yml
    secrets: inherit

  e2e-agents:
    # Both Privy E2E suites currently consume the same OTP inbox.
    # Running them concurrently causes nondeterministic code pickup.
    needs: e2e-console
    uses: ./.github/workflows/e2e-agents.yml
    secrets: inherit
