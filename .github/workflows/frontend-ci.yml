name: Frontend CI
run-name: Frontend CI

on:
  push:
    branches: [main, dev]
    paths:
      - ".github/workflows/**"
      - ".github/scripts/**"
      - "site/**"
      - "ts-sdk/**"
      - "sdk/**"
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Netlify environment to publish after building all sites.
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

jobs:
  sdk:
    uses: ./.github/workflows/sdk-integration-tests.yml
    secrets: inherit

  publish-sites:
    needs: sdk
    uses: ./.github/workflows/publish-sites.yml
    with:
      deploy_environment: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_environment || 'dev' }}
    secrets: inherit

  e2e-console:
    needs: publish-sites
    uses: ./.github/workflows/e2e-tests.yml
    secrets: inherit

  e2e-agents:
    # Both Privy E2E suites currently consume the same OTP inbox.
    # Running them concurrently causes nondeterministic code pickup.
    needs: e2e-console
    uses: ./.github/workflows/e2e-agents.yml
    secrets: inherit
