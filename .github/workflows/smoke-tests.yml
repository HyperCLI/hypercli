name: Smoke Tests

on:
  workflow_dispatch:

env:
  GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  smoke:
    runs-on: self-hosted
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    env:
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_IMAP_HOST: ${{ secrets.TEST_IMAP_HOST }}
      TEST_IMAP_USER: ${{ secrets.TEST_IMAP_USER }}
      TEST_IMAP_PASS: ${{ secrets.TEST_IMAP_PASS }}
      SMOKE_MAIN_SITE_URL: https://hypercli.com
      SMOKE_CONSOLE_SITE_URL: https://console.hypercli.com
      SMOKE_AGENTS_SITE_URL: https://agents.hypercli.com
      SMOKE_AGENTS_API_URL: https://api.agents.hypercli.com/api
      NOTIFY_URL: https://api.hypercli.com/notify/notify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm install

      - name: Install Playwright browsers
        working-directory: site
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        id: smoke
        continue-on-error: true
        working-directory: site
        run: npx playwright test --config tests/smoke/playwright.config.ts

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-playwright-artifacts
          path: |
            site/playwright-report
            site/test-results
          if-no-files-found: ignore

      - name: Upload failure screenshot to notify
        if: steps.smoke.outcome == 'failure'
        continue-on-error: true
        env:
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import urllib.request
          from pathlib import Path

          notify_api_key = os.getenv("NOTIFY_API_KEY", "").strip()
          if not notify_api_key:
              raise SystemExit(0)

          endpoint = os.getenv("NOTIFY_URL", "https://api.hypercli.com/notify/notify")
          run_url = os.getenv("GITHUB_RUN_URL", "")
          screenshots = sorted(Path("site/test-results").rglob("*.png"))
          if not screenshots:
              raise SystemExit(0)

          screenshot = screenshots[0]
          test_name = screenshot.parent.name if screenshot.parent.name != "test-results" else screenshot.stem
          payload = {
              "category": "frontend",
              "severity": "error",
              "message": f"Frontend smoke failed\nTest: {test_name}\nWorkflow: Smoke Tests\nRun: {run_url}",
              "image": base64.b64encode(screenshot.read_bytes()).decode("ascii"),
              "image_filename": screenshot.name,
              "channel": "frontend",
          }
          request = urllib.request.Request(
              endpoint,
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "X-BACKEND-API-KEY": notify_api_key,
              },
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              response.read()
          PY

      - name: Notify smoke result
        if: steps.smoke.outcome == 'success'
        continue-on-error: true
        env:
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
          SMOKE_STATUS: ${{ steps.smoke.outcome }}
        run: |
          MESSAGE="$(python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("site/test-results/smoke-results.json")
          status = os.getenv("SMOKE_STATUS", "unknown").strip().lower()
          counts = {"total": 0, "passed": 0, "failed": 0, "skipped": 0}

          def walk_suite(node: dict) -> None:
              for spec in node.get("specs", []):
                  for test in spec.get("tests", []):
                      last_result = test.get("results", [])[-1] if test.get("results") else {}
                      outcome = (last_result.get("status") or test.get("status") or "").lower()
                      counts["total"] += 1
                      if outcome == "passed":
                          counts["passed"] += 1
                      elif outcome in {"failed", "timedout", "interrupted"}:
                          counts["failed"] += 1
                      else:
                          counts["skipped"] += 1
              for suite in node.get("suites", []):
                  walk_suite(suite)

          if report_path.exists():
              report = json.loads(report_path.read_text())
              for suite in report.get("suites", []):
                  walk_suite(suite)

          print(
              f"Smoke tests passed: {counts['passed']}/{counts['total']} passed"
              if counts["total"]
              else "Smoke tests passed"
          )
          PY
          )"

          python3 .github/scripts/ci_notify.py \
            --category frontend \
            --phase test \
            --status "${SMOKE_STATUS}" \
            --event "${{ github.event_name }}" \
            --message "${MESSAGE}" \
            --channel frontend \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Fail workflow on smoke failure
        if: steps.smoke.outcome == 'failure'
        run: exit 1
