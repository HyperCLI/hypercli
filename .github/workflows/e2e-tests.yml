name: playwright-console

on:
  workflow_call:
  workflow_dispatch:

env:
  GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  playwright-e2e:
    runs-on: self-hosted
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    env:
      TEST_HOSTNAME: 127.0.0.1
      TEST_API_BASE_URL: https://api.dev.hypercli.com
      BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
      TEST_EMAIL: ${{ vars.TEST_EMAIL }}
      TEST_IMAP_HOST: ${{ vars.TEST_IMAP_HOST }}
      TEST_IMAP_USER: ${{ vars.TEST_IMAP_USER }}
      TEST_IMAP_PASS: ${{ secrets.TEST_IMAP_PASS }}
      NOTIFY_URL: ${{ vars.NOTIFY_URL }}
      PLAYWRIGHT_ARTIFACTS_DIR: ${{ github.workspace }}/.e2e-artifacts/playwright-console-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Normalize workspace ownership
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bootstrap console E2E API key
        run: |
          python3 -m venv .bootstrap-venv
          source .bootstrap-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install requests
          python .github/scripts/bootstrap_console_test_key.py bootstrap --format github-env >> "$GITHUB_ENV"

      - name: Build E2E image
        id: build-e2e
        run: |
          IMAGE_TAG="e2e-console-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            .github/scripts/build_e2e_image.sh >> "$GITHUB_OUTPUT"

      - name: Run dockerized Playwright tests
        id: e2e
        continue-on-error: true
        env:
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
        run: |
          ARTIFACTS_DIR="${PLAYWRIGHT_ARTIFACTS_DIR}"
          rm -rf "${ARTIFACTS_DIR}"
          mkdir -p "${ARTIFACTS_DIR}"
          docker run --rm --init \
            -e TEST_HOSTNAME \
            -e TEST_API_BASE_URL \
            -e BACKEND_API_KEY \
            -e TEST_EMAIL \
            -e TEST_IMAP_HOST \
            -e TEST_IMAP_USER \
            -e TEST_IMAP_PASS \
            -e NOTIFY_URL \
            -e NOTIFY_API_KEY \
            -e GITHUB_RUN_URL \
            -e TEST_API_KEY \
            -e EXPECTED_TEST_EMAIL \
            -e E2E_ARTIFACTS_DIR=/artifacts \
            -v "${ARTIFACTS_DIR}:/artifacts" \
            "${{ steps.build-e2e.outputs.e2e_image }}" \
            bash -lc 'cd /workspace && ./.github/scripts/run_e2e_console.sh'

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: ${{ env.PLAYWRIGHT_ARTIFACTS_DIR }}
          if-no-files-found: ignore

      - name: Cleanup bootstrapped credentials
        if: always()
        run: |
          if [ -d .bootstrap-venv ]; then
            source .bootstrap-venv/bin/activate
          fi
          if [ -n "${BOOTSTRAP_STATE_FILE:-}" ] && [ -f "${BOOTSTRAP_STATE_FILE}" ]; then
            python .github/scripts/bootstrap_console_test_key.py cleanup --state-file "${BOOTSTRAP_STATE_FILE}" || true
          fi

      - name: Notify e2e result
        if: steps.e2e.outcome == 'success'
        continue-on-error: true
        env:
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
          E2E_STATUS: ${{ steps.e2e.outcome }}
        run: |
          MESSAGE="Frontend playwright-console passed"
          python3 .github/scripts/ci_notify.py \
            --category frontend \
            --phase test \
            --status "${E2E_STATUS}" \
            --event "${{ github.event_name }}" \
            --message "${MESSAGE}" \
            --workflow "playwright-console" \
            --channel frontend \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Fail workflow on e2e failure
        if: steps.e2e.outcome == 'failure'
        run: exit 1
