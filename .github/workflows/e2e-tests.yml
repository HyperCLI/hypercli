name: E2E Console

on:
  workflow_call:
  workflow_dispatch:

env:
  GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  playwright-e2e:
    runs-on: self-hosted
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --ipc=host
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    env:
      TEST_BASE_URL: http://127.0.0.1:4003
      TEST_CONSOLE_BASE_URL: http://127.0.0.1:4001
      TEST_TOPUP_CONSOLE_BASE_URL: http://127.0.0.1:4001
      TEST_HOSTNAME: 127.0.0.1
      TEST_API_BASE_URL: https://api.dev.hypercli.com
      TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_IMAP_HOST: ${{ secrets.TEST_IMAP_HOST }}
      TEST_IMAP_USER: ${{ secrets.TEST_IMAP_USER }}
      TEST_IMAP_PASS: ${{ secrets.TEST_IMAP_PASS }}
      NOTIFY_URL: https://api.hypercli.com/notify/notify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            ts-sdk/package-lock.json
            site/package-lock.json

      - name: Build TS SDK
        working-directory: ts-sdk
        run: |
          npm ci
          npm run build

      - name: Install site dependencies
        working-directory: site
        run: npm install

      - name: Run Playwright tests
        id: e2e
        continue-on-error: true
        env:
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
        run: .github/scripts/run_e2e_console.sh

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            site/playwright-report
            site/test-results
          if-no-files-found: ignore

      - name: Restore runner workspace ownership
        if: always()
        run: |
          chown -R 1000:1000 /__w/hypercli/hypercli /__w/hypercli

      - name: Notify e2e result
        if: steps.e2e.outcome == 'success'
        continue-on-error: true
        env:
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
          E2E_STATUS: ${{ steps.e2e.outcome }}
        run: |
          MESSAGE="Frontend console e2e passed"
          python3 .github/scripts/ci_notify.py \
            --category frontend \
            --phase test \
            --status "${E2E_STATUS}" \
            --event "${{ github.event_name }}" \
            --message "${MESSAGE}" \
            --workflow "E2E Console" \
            --channel frontend \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Fail workflow on e2e failure
        if: steps.e2e.outcome == 'failure'
        run: exit 1
