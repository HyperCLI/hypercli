name: E2E Console

on:
  workflow_call:
  workflow_dispatch:

env:
  GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  playwright-e2e:
    runs-on: self-hosted
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --ipc=host
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    env:
      TEST_HOSTNAME: 127.0.0.1
      TEST_API_BASE_URL: https://api.dev.hypercli.com
      BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
      TEST_EMAIL: ${{ vars.TEST_EMAIL }}
      TEST_IMAP_HOST: ${{ vars.TEST_IMAP_HOST }}
      TEST_IMAP_USER: ${{ vars.TEST_IMAP_USER }}
      TEST_IMAP_PASS: ${{ secrets.TEST_IMAP_PASS }}
      NOTIFY_URL: ${{ vars.NOTIFY_URL }}
    steps:
      - name: Prepare runner workspace ownership
        run: |
          set -eu
          TARGET_DIR="$(dirname "${GITHUB_WORKSPACE}")"
          TARGET_UID="$(stat -c '%u' "${TARGET_DIR}")"
          TARGET_GID="$(stat -c '%g' "${TARGET_DIR}")"
          if [ -d "${GITHUB_WORKSPACE}" ]; then
            chown -R "${TARGET_UID}:${TARGET_GID}" "${GITHUB_WORKSPACE}"
          fi

      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            ts-sdk/package-lock.json
            site/package-lock.json

      - name: Build TS SDK
        working-directory: ts-sdk
        run: |
          npm ci
          npm run build

      - name: Install site dependencies
        working-directory: site
        run: |
          npm install
          npm run sdk:use-checkout

      - name: Install Playwright browser
        working-directory: site
        run: npx playwright install --with-deps chromium

      - name: Install bootstrap dependencies
        run: apt-get update && apt-get install -y python3 python3-pip python3-venv

      - name: Bootstrap console E2E API key
        run: |
          python3 -m venv .bootstrap-venv
          source .bootstrap-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install requests
          python .github/scripts/bootstrap_console_test_key.py bootstrap --format github-env >> "$GITHUB_ENV"

      - name: Allocate local E2E ports
        run: |
          source .github/scripts/allocate_e2e_env.sh
          {
            echo "TEST_MAIN_BASE_URL=${TEST_MAIN_BASE_URL}"
            echo "TEST_BASE_URL=${TEST_BASE_URL}"
            echo "TEST_CONSOLE_BASE_URL=${TEST_CONSOLE_BASE_URL}"
            echo "TEST_TOPUP_CONSOLE_BASE_URL=${TEST_TOPUP_CONSOLE_BASE_URL}"
            echo "TEST_HOSTNAME=${TEST_HOSTNAME}"
            echo "LOCAL_MAIN_SITE_URL=${LOCAL_MAIN_SITE_URL}"
            echo "LOCAL_CONSOLE_URL=${LOCAL_CONSOLE_URL}"
            echo "LOCAL_AGENTS_URL=${LOCAL_AGENTS_URL}"
            echo "LOCAL_COOKIE_DOMAIN=${LOCAL_COOKIE_DOMAIN}"
            echo "LOCAL_HYPERCLAW_COOKIE_DOMAIN=${LOCAL_HYPERCLAW_COOKIE_DOMAIN}"
            echo "LOCAL_DOMAIN=${LOCAL_DOMAIN}"
            echo "CONSOLE_PORT=${CONSOLE_PORT}"
            echo "CLAW_PORT=${CLAW_PORT}"
          } >> "$GITHUB_ENV"

      - name: Run Playwright tests
        id: e2e
        continue-on-error: true
        env:
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
        run: .github/scripts/run_e2e_console.sh

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            site/playwright-report
            site/test-results
          if-no-files-found: ignore

      - name: Cleanup bootstrapped credentials
        if: always()
        run: |
          if [ -d .bootstrap-venv ]; then
            source .bootstrap-venv/bin/activate
          fi
          if [ -n "${BOOTSTRAP_STATE_FILE:-}" ] && [ -f "${BOOTSTRAP_STATE_FILE}" ]; then
            python .github/scripts/bootstrap_console_test_key.py cleanup --state-file "${BOOTSTRAP_STATE_FILE}" || true
          fi

      - name: Restore runner workspace ownership
        if: always()
        run: |
          set -eu
          TARGET_DIR="$(dirname "${GITHUB_WORKSPACE}")"
          TARGET_UID="$(stat -c '%u' "${TARGET_DIR}")"
          TARGET_GID="$(stat -c '%g' "${TARGET_DIR}")"
          chown -R "${TARGET_UID}:${TARGET_GID}" "${GITHUB_WORKSPACE}"

      - name: Notify e2e result
        if: steps.e2e.outcome == 'success'
        continue-on-error: true
        env:
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
          E2E_STATUS: ${{ steps.e2e.outcome }}
        run: |
          MESSAGE="Frontend console e2e passed"
          python3 .github/scripts/ci_notify.py \
            --category frontend \
            --phase test \
            --status "${E2E_STATUS}" \
            --event "${{ github.event_name }}" \
            --message "${MESSAGE}" \
            --workflow "E2E Console" \
            --channel frontend \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Fail workflow on e2e failure
        if: steps.e2e.outcome == 'failure'
        run: exit 1
