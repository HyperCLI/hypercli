name: Build Site
run-name: Build Site

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    container:
      image: node:22-bookworm
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Build TS SDK
        working-directory: ts-sdk
        run: |
          npm ci
          npm run build

      - name: Prepare site env
        working-directory: site
        run: |
          cp env.dev apps/main/.env.local
          cp env.dev apps/console/.env.local
          cp env.dev apps/claw/.env.local

      - name: Install and build
        working-directory: site
        run: |
          npm install
          npm run sdk:use-local
          npm run build
