name: Build Site
run-name: Build Site

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    steps:
      - name: Prepare runner workspace ownership
        run: |
          set -eu
          REPO_DIR="${GITHUB_WORKSPACE}"
          PARENT_DIR="$(dirname "${REPO_DIR}")"
          if [ -d "${REPO_DIR}" ]; then
            docker run --rm -v "${PARENT_DIR}:${PARENT_DIR}" alpine:3.22 \
              sh -lc "chown -R $(id -u):$(id -g) '${REPO_DIR}'"
          fi

      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Build site image
        id: build_site
        run: |
          set -euo pipefail
          IMAGE_TAG="${GITHUB_SHA}" .github/scripts/build_site_image.sh

      - name: Run site build in container
        run: |
          set -euo pipefail
          SITE_IMAGE="${{ steps.build_site.outputs.site_image }}" \
            .github/scripts/run_site_image.sh

      - name: Restore runner workspace ownership
        if: always()
        run: |
          set -eu
          REPO_DIR="${GITHUB_WORKSPACE}"
          PARENT_DIR="$(dirname "${REPO_DIR}")"
          if [ -d "${REPO_DIR}" ]; then
            docker run --rm -v "${PARENT_DIR}:${PARENT_DIR}" alpine:3.22 \
              sh -lc "chown -R $(id -u):$(id -g) '${REPO_DIR}'"
          fi
