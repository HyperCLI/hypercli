name: E2E Agents

on:
  workflow_call:
  workflow_dispatch:

env:
  GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  playwright-agents:
    runs-on: self-hosted
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    env:
      TEST_HOSTNAME: 127.0.0.1
      TEST_EMAIL: ${{ vars.TEST_EMAIL }}
      TEST_IMAP_HOST: ${{ vars.TEST_IMAP_HOST }}
      TEST_IMAP_USER: ${{ vars.TEST_IMAP_USER }}
      TEST_IMAP_PASS: ${{ secrets.TEST_IMAP_PASS }}
      TEST_AGENTS_API_BASE_URL: https://api.dev.hypercli.com/agents
      TEST_STRIPE_AGENTS_SECRET_KEY: ${{ secrets.TEST_STRIPE_AGENTS_SECRET_KEY }}
      NOTIFY_URL: ${{ vars.NOTIFY_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Normalize workspace ownership
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"

      - name: Build E2E image
        id: build-e2e
        run: |
          IMAGE_TAG="e2e-agents-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          .github/scripts/build_e2e_image.sh >> "$GITHUB_OUTPUT"

      - name: Run dockerized Playwright tests
        id: e2e
        continue-on-error: true
        env:
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
        run: |
          ARTIFACTS_DIR="${RUNNER_TEMP}/playwright-agents-artifacts"
          rm -rf "${ARTIFACTS_DIR}"
          mkdir -p "${ARTIFACTS_DIR}"
          docker run --rm --init \
            -e TEST_HOSTNAME \
            -e TEST_EMAIL \
            -e TEST_IMAP_HOST \
            -e TEST_IMAP_USER \
            -e TEST_IMAP_PASS \
            -e TEST_AGENTS_API_BASE_URL \
            -e TEST_STRIPE_AGENTS_SECRET_KEY \
            -e NOTIFY_URL \
            -e NOTIFY_API_KEY \
            -e GITHUB_RUN_URL \
            -e E2E_ARTIFACTS_DIR=/artifacts \
            -v "${ARTIFACTS_DIR}:/artifacts" \
            "${{ steps.build-e2e.outputs.e2e_image }}" \
            bash -lc 'cd /workspace && ./.github/scripts/run_e2e_agents.sh'

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-agents-artifacts
          path: ${{ runner.temp }}/playwright-agents-artifacts
          if-no-files-found: ignore

      - name: Notify e2e result
        if: steps.e2e.outcome == 'success'
        continue-on-error: true
        env:
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
          E2E_STATUS: ${{ steps.e2e.outcome }}
        run: |
          MESSAGE="Frontend agents e2e passed"
          python3 .github/scripts/ci_notify.py \
            --category frontend \
            --phase test \
            --status "${E2E_STATUS}" \
            --event "${{ github.event_name }}" \
            --message "${MESSAGE}" \
            --workflow "E2E Agents" \
            --channel frontend \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Fail workflow on e2e failure
        if: steps.e2e.outcome == 'failure'
        run: exit 1
